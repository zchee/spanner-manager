name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  test:
    runs-on: ubuntu-24.04

    permissions:
      id-token: "write"

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6

      # https://github.com/actions/setup-go
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          check-latest: true
          cache-dependency-path: |
            go.sum

      - name: Run Unit tests
        run: |
          go test -v -race -count=1 -shuffle=on -cover -covermode=atomic -coverpkg=./... -coverprofile=coverage.out -tags='osusergo,netgo,static' -ldflags='-s -w' ./...

      # https://github.com/codecov/codecov-action
      - name: Upload Coverage report to CodeCov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          verbose: true

  vet:
    runs-on: ubuntu-24.04

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6

      # https://github.com/actions/setup-go
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          check-latest: true
          cache-dependency-path: |
            go.sum

      - name: Run go vet
        run: |
          go vet ./...
